  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <circle cx="230" cy="180" r="140" fill="#ff6a3d" fill-opacity="0.45"/>
  <circle cx="980" cy="620" r="200" fill="#6ed3b7" fill-opacity="0.35"/>
  <rect x="160" y="220" width="880" height="360" rx="30" fill="#f6f5f2" fill-opacity="0.92"/>
  <text x="200" y="330" font-family="Arial, sans-serif" font-size="48" fill="#0d1117">Portfolio Showcase</text>
