<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1200 800'>
  <defs>
    <linearGradient id='bg' x1='0' y1='0' x2='1' y2='1'>
      <stop offset='0%' stop-color='#1b4332'/>
      <stop offset='100%' stop-color='#2d6a4f'/>
    </linearGradient>
    <pattern id='dots' width='28' height='28' patternUnits='userSpaceOnUse'>
      <circle cx='3' cy='3' r='2' fill='rgba(255,255,255,0.18)'/>
    </pattern>
  </defs>

  <rect width='1200' height='800' fill='url(#bg)'/>
  <rect width='1200' height='800' fill='url(#dots)'/>

  <!-- rising sun -->
  <circle cx='960' cy='130' r='78' fill='rgba(255,200,120,0.9)'/>

  <!-- hills/river layers -->
  <path d='M0 560 C180 500 320 620 520 560 C720 500 880 610 1200 530 L1200 800 L0 800 Z' fill='rgba(18,70,76,0.55)'/>
  <path d='M0 620 C220 560 380 670 620 615 C820 570 980 660 1200 610 L1200 800 L0 800 Z' fill='rgba(7,41,45,0.62)'/>

  <!-- temple silhouette -->
  <g fill='rgba(18,21,26,0.72)'>
    <rect x='120' y='430' width='200' height='170' rx='10'/>
    <polygon points='130,430 220,320 310,430'/>
    <rect x='198' y='490' width='44' height='110' fill='rgba(255,220,170,0.8)'/>
    <circle cx='220' cy='305' r='10' fill='rgba(255,220,170,0.85)'/>
  </g>

  <!-- rangoli / mandala motif -->
  <g transform='translate(1020 640)'>
    <circle r='86' fill='none' stroke='rgba(255,255,255,0.45)' stroke-width='5'/>
    <circle r='58' fill='none' stroke='#ffe66d' stroke-width='6'/>
    <circle r='28' fill='rgba(255,255,255,0.8)'/>
    <g stroke='rgba(255,255,255,0.8)' stroke-width='4'>
      <line x1='-86' y1='0' x2='86' y2='0'/>
      <line x1='0' y1='-86' x2='0' y2='86'/>
      <line x1='-60' y1='-60' x2='60' y2='60'/>
      <line x1='-60' y1='60' x2='60' y2='-60'/>
    </g>
  </g>

  <!-- text plate -->
  <rect x='66' y='64' width='620' height='140' rx='20' fill='rgba(0,0,0,0.32)'/>
  <text x='96' y='125' font-family='Georgia, serif' font-size='54' fill='#ffffff' font-weight='700'>Monsoon Nature Story</text>
  <text x='96' y='172' font-family='Verdana, sans-serif' font-size='29' fill='rgba(255,255,255,0.92)'>Green valleys, rivers, and misty mornings</text>
</svg>
